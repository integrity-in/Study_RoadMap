<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MIT Scholar">
    
    <link rel="apple-touch-icon" href="https://via.placeholder.com/180/A31F34/FFFFFF?text=MIT">
    
    <meta name="theme-color" content="#A31F34">

    <title>MIT Scholar Roadmap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --mit-red: #A31F34;
            --mit-dark: #111827;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            scroll-behavior: smooth; 
            /* viewport-fit=cover와 함께 사용하여 상단 노치 및 하단 바 영역 여백 확보 */
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            -webkit-tap-highlight-color: transparent;
            background-color: #FAFAFA;
            /* 앱처럼 텍스트 선택 방지 (선택 사항) */
            -webkit-user-select: none;
        }
        
        /* iPhone 최적화 하단 내비게이션 */
        .mobile-nav { 
            display: flex; 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            z-index: 100; 
            justify-content: space-evenly; 
            padding: 12px 0; 
            border-top: 0.5px solid rgba(0,0,0,0.1); 
            padding-bottom: calc(12px + env(safe-area-inset-bottom)); 
            box-shadow: 0 -1px 0 rgba(0,0,0,0.05);
        }

        /* 햅틱 반응 느낌을 주는 카드 애니메이션 보완 */
        .course-card { 
            background: #FFFFFF;
            border-radius: 18px;
            padding: 20px;
            border: 1px solid #F3F4F6;
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.2s ease;
            -webkit-user-drag: none;
        }
        .course-card:active { 
            transform: scale(0.96); /* 터치 시 눌리는 효과 강화 */
            background-color: #F9FAFB;
        }

        /* 상단 헤더 스티키 효과 보완 (Dynamic Island 대응) */
        .stage-header { 
            position: sticky; 
            top: env(safe-area-inset-top); 
            z-index: 30; 
            background: rgba(250,250,250,0.85); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            padding: 16px 0 12px 0;
            margin-bottom: 20px;
            border-bottom: 0.5px solid #E5E7EB;
        }

        /* 스크롤바 숨기기 */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
